<!doctype html>
<html>
    <head>
        <title>Word Processor</title>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="./style.css" />
        <script type="module" src="./script.js" defer></script>
    </head>
    <body>
        <div>
            <h1>Word Processor</h1>

            <select id="zoom-select" autocomplete="off">
                <option value="50">50%</option>
                <option value="75">75%</option>
                <option value="90">90%</option>
                <option value="100">100%</option>
                <option value="125">125%</option>
                <option value="150">150%</option>
                <option value="200">200%</option>
            </select>

            <select id="family-select" autocomplete="off">
                <option value="serif">Serif</option>
                <option value="sans-serif">Sans-serif</option>
                <option value="cursive">Cursive</option>
                <option value="monospace">Monospace</option>
            </select>

            <select id="size-select" autocomplete="off">
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="14">14</option>
                <option value="18">18</option>
                <option value="24">24</option>
                <option value="30">30</option>
                <option value="36">36</option>
                <option value="48">48</option>
                <option value="60">60</option>
                <option value="72">72</option>
                <option value="96">96</option>
            </select>

            <select id="leading-select" autocomplete="off">
                <option value="1">Single</option>
                <option value="1.15">1.15</option>
                <option value="1.5">1.5</option>
                <option value="2">Double</option>
            </select>

            <div id="spacer"></div>

            <button id="save-button">Save</button>
            <button id="reset-button">Reset</button>
        </div>
        <canvas id="canvas" tabindex="0"></canvas>
    </body>
</html>
